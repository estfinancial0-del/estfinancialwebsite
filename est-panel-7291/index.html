<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>EST Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #080f1e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
    }
    .login-logo img { height: 32px; }
    .login-logo span { color: white; font-size: 14px; font-weight: 600; letter-spacing: 0.08em; opacity: 0.7; }
    h1 { color: white; font-size: 1.4rem; margin-bottom: 0.4rem; }
    .subtitle { color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 2rem; }
    label { display: block; color: rgba(255,255,255,0.6); font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%; padding: 12px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: white; font-family: inherit; font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #e5291f; }
    .btn-login {
      width: 100%; margin-top: 1.25rem;
      padding: 13px;
      background: #e5291f;
      color: white; font-family: inherit; font-size: 15px; font-weight: 600;
      border: none; border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-login:hover { background: #c9221a; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { background: #555; cursor: not-allowed; }
    .error-msg {
      margin-top: 1rem; padding: 10px 14px;
      background: rgba(229,41,31,0.12);
      border: 1px solid rgba(229,41,31,0.3);
      border-radius: 8px;
      color: #f87171; font-size: 13px;
      display: none;
    }
    .lockout-msg {
      margin-top: 1rem; padding: 10px 14px;
      background: rgba(234,179,8,0.12);
      border: 1px solid rgba(234,179,8,0.3);
      border-radius: 8px;
      color: #fde047; font-size: 13px;
      display: none;
    }
    .attempts-left { color: rgba(255,255,255,0.3); font-size: 12px; margin-top: 8px; text-align: center; }
    .secure-badge {
      display: flex; align-items: center; gap: 6px;
      margin-top: 1.5rem;
      color: rgba(255,255,255,0.2); font-size: 11px;
      justify-content: center;
    }
    .secure-badge svg { width: 12px; height: 12px; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <img src="../images/est-logo-red.png" alt="EST" />
    <span>ADMIN PANEL</span>
  </div>
  <h1>Sign In</h1>
  <p class="subtitle">EST Financial content management</p>

  <form id="loginForm">
    <label for="pwd">Password</label>
    <input type="password" id="pwd" autocomplete="current-password" placeholder="Enter password" required />
    <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
    <div class="error-msg" id="errorMsg"></div>
    <div class="lockout-msg" id="lockoutMsg"></div>
    <p class="attempts-left" id="attemptsLeft"></p>
  </form>

  <div class="secure-badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    Secured · Session expires after 2 hours
  </div>
</div>

<script>
// ── Security Config ────────────────────────────────────────────────
const PASSWORD_HASH = '00ebc280d66cb59e4a1dca5c3320b7eb26cf78d705415fcb1ae287b8fff7fbf1'; // Est@2025!
const MAX_ATTEMPTS  = 5;
const LOCKOUT_MS    = 15 * 60 * 1000; // 15 min
const SESSION_MS    = 2  * 60 * 60 * 1000; // 2 hrs
const GITHUB_REPO   = 'estfinancial0-del/estfinancialwebsite';

// ── Hash helper ───────────────────────────────────────────────────
async function sha256(str) {
  const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── Lockout check ─────────────────────────────────────────────────
function isLockedOut() {
  const lockUntil = parseInt(localStorage.getItem('est_lock_until') || '0');
  return Date.now() < lockUntil;
}
function lockoutRemaining() {
  const lockUntil = parseInt(localStorage.getItem('est_lock_until') || '0');
  return Math.ceil((lockUntil - Date.now()) / 60000);
}
function getAttempts() { return parseInt(localStorage.getItem('est_attempts') || '0'); }
function resetAttempts() { localStorage.removeItem('est_attempts'); localStorage.removeItem('est_lock_until'); }
function incrementAttempts() {
  const n = getAttempts() + 1;
  localStorage.setItem('est_attempts', n);
  if (n >= MAX_ATTEMPTS) {
    localStorage.setItem('est_lock_until', Date.now() + LOCKOUT_MS);
    localStorage.setItem('est_attempts', '0');
  }
  return n;
}

// ── Already logged in? ────────────────────────────────────────────
const sessionStart = parseInt(sessionStorage.getItem('est_session') || '0');
if (sessionStart && Date.now() - sessionStart < SESSION_MS) {
  window.location.href = 'dashboard.html';
}

// ── UI helpers ────────────────────────────────────────────────────
const form       = document.getElementById('loginForm');
const btn        = document.getElementById('loginBtn');
const errorMsg   = document.getElementById('errorMsg');
const lockoutMsg = document.getElementById('lockoutMsg');
const attLeft    = document.getElementById('attemptsLeft');

function showLockout() {
  lockoutMsg.style.display = 'block';
  lockoutMsg.textContent   = `Too many failed attempts. Try again in ${lockoutRemaining()} minute(s).`;
  btn.disabled = true;
  errorMsg.style.display = 'none';
  setTimeout(() => { if (!isLockedOut()) { lockoutMsg.style.display='none'; btn.disabled=false; attLeft.textContent=''; } }, 10000);
}

if (isLockedOut()) showLockout();

// ── Login ─────────────────────────────────────────────────────────
form.addEventListener('submit', async e => {
  e.preventDefault();
  if (isLockedOut()) { showLockout(); return; }

  btn.disabled = true;
  btn.textContent = 'Verifying…';
  errorMsg.style.display = 'none';

  const pwd    = document.getElementById('pwd').value;
  const hash   = await sha256(pwd);

  if (hash === PASSWORD_HASH) {
    resetAttempts();
    sessionStorage.setItem('est_session', Date.now());
    // Audit log: write login event to GitHub
    const token = localStorage.getItem('est_gh_token');
    if (token) logLogin(token);
    window.location.href = 'dashboard.html';
  } else {
    const n = incrementAttempts();
    if (isLockedOut()) {
      showLockout();
    } else {
      const left = MAX_ATTEMPTS - n;
      errorMsg.style.display = 'block';
      errorMsg.textContent   = 'Incorrect password.';
      attLeft.textContent    = left > 0 ? `${left} attempt${left !== 1 ? 's' : ''} remaining` : '';
      btn.disabled  = false;
      btn.textContent = 'Sign In';
    }
  }
});

// ── Audit Log (Security Layer 7) ──────────────────────────────────
async function logLogin(token) {
  try {
    const logPath = 'est-panel-7291/access.log.json';
    const entry   = { time: new Date().toISOString(), ua: navigator.userAgent.slice(0,80) };
    // Try to get existing log
    const r = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${logPath}`, {
      headers: { 'Authorization': `token ${token}` }
    });
    let entries = [], sha = null;
    if (r.ok) { const d = await r.json(); sha = d.sha; entries = JSON.parse(atob(d.content.replace(/\n/g,''))); }
    entries.unshift(entry);
    if (entries.length > 100) entries = entries.slice(0,100);
    const body = { message: `🔐 Admin login ${entry.time}`, content: btoa(JSON.stringify(entries,null,2)), sha };
    if (sha) body.sha = sha; else delete body.sha;
    await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${logPath}`, {
      method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  } catch(e) { /* silent */ }
}
</script>
</body>
</html>
