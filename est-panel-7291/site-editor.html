<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EST Site Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  #toolbar {
    height: 54px; background: #161b22; border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; gap: 10px; padding: 0 16px; flex-shrink: 0;
  }
  .toolbar-logo { font-size: 13px; font-weight: 700; color: white; letter-spacing: -0.3px; }
  .toolbar-logo span { color: #e5291f; }
  .divider { width: 1px; height: 22px; background: rgba(255,255,255,0.1); margin: 0 4px; }

  #pageSelect {
    background: #21262d; border: 1px solid rgba(255,255,255,0.1); color: white;
    padding: 6px 10px; border-radius: 7px; font-family: inherit; font-size: 13px;
    cursor: pointer; outline: none; min-width: 160px;
  }

  #editToggle {
    padding: 7px 14px; border-radius: 7px; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7);
    font-family: inherit; font-size: 13px; cursor: pointer; transition: all 0.15s;
  }
  #editToggle.active { background: rgba(229,41,31,0.15); border-color: rgba(229,41,31,0.4); color: #f87171; }
  #editToggle:hover { background: rgba(255,255,255,0.1); color: white; }

  #saveBtn {
    padding: 7px 16px; border-radius: 7px; border: none;
    background: #e5291f; color: white; font-family: inherit; font-size: 13px;
    font-weight: 600; cursor: pointer; transition: all 0.15s; margin-left: auto;
  }
  #saveBtn:hover { background: #c8241a; }
  #saveBtn:disabled { background: rgba(229,41,31,0.3); cursor: not-allowed; }

  #status { font-size: 12px; color: rgba(255,255,255,0.35); white-space: nowrap; }
  #status.ok   { color: #3fb950; }
  #status.err  { color: #f85149; }
  #status.busy { color: #e3b341; }

  .back-btn {
    padding: 6px 10px; border-radius: 7px; border: 1px solid rgba(255,255,255,0.08);
    background: none; color: rgba(255,255,255,0.4); font-family: inherit; font-size: 12px;
    cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 4px;
  }
  .back-btn:hover { color: white; border-color: rgba(255,255,255,0.2); }

  #editHint {
    display: none; height: 32px; background: rgba(229,41,31,0.07);
    border-bottom: 1px solid rgba(229,41,31,0.18);
    align-items: center; justify-content: center;
    font-size: 12px; color: rgba(255,255,255,0.45); flex-shrink: 0;
  }
  #editHint.show { display: flex; }
  #editHint strong { color: rgba(255,255,255,0.7); }

  #frame { flex: 1; border: none; width: 100%; background: white; }
</style>
</head>
<body>

<div id="toolbar">
  <a class="back-btn" href="dashboard.html">← Back</a>
  <div class="divider"></div>
  <span class="toolbar-logo"><span>est.</span> Site Editor</span>
  <div class="divider"></div>

  <select id="pageSelect" onchange="loadPage(this.value)">
    <option value="../index.html">🏠 Home</option>
    <option value="../about.html">👥 About</option>
    <option value="../services.html">⚡ Services</option>
    <option value="../contact.html">📬 Contact</option>
    <option value="../media.html">🎬 Media</option>
    <option value="../case-studies.html">📁 Case Studies</option>
  </select>

  <button id="editToggle" onclick="toggleEdit()">✏ Edit Mode</button>
  <span id="status">Loading…</span>
  <button id="saveBtn" onclick="saveChanges()" disabled>💾 Save &amp; Publish</button>
</div>

<div id="editHint">
  <strong>Click any text</strong>&nbsp;to edit &nbsp;·&nbsp; <strong>Click any image</strong>&nbsp;to replace it &nbsp;·&nbsp; <strong>Click any placeholder</strong>&nbsp;to add image or video &nbsp;·&nbsp; <strong>▶ Change Video</strong>&nbsp;button on videos &nbsp;·&nbsp; <strong>⌘S</strong>&nbsp;to save
</div>

<iframe id="frame"></iframe>
<input type="file" id="imgPicker" accept="image/*" style="display:none" />

<script>
const SESSION_MS  = 2 * 60 * 60 * 1000;
const GITHUB_REPO = 'estfinancial0-del/estfinancialwebsite';
const GITHUB_API  = `https://api.github.com/repos/${GITHUB_REPO}/contents`;

if (!sessionStorage.getItem('est_session') || Date.now() - parseInt(sessionStorage.getItem('est_session')) > SESSION_MS) {
  window.location.href = 'index.html';
}

const ghToken    = localStorage.getItem('est_gh_token');
const frame      = document.getElementById('frame');
const editToggle = document.getElementById('editToggle');
const saveBtn    = document.getElementById('saveBtn');
const statusEl   = document.getElementById('status');
const editHint   = document.getElementById('editHint');

let editMode    = false;
let currentPage = null;
let targetImg   = null;
let targetMode  = 'image'; // 'image' | 'placeholder' | 'video'

// ── Load page ──────────────────────────────────────────────────────────
function loadPage(src) {
  currentPage = src;
  editMode    = false;
  updateEditUI();
  saveBtn.disabled = true;
  setStatus('Loading…', 'busy');
  frame.src = src;
}

frame.addEventListener('load', () => {
  setStatus('Ready', '');
  saveBtn.disabled = false;
  if (editMode) inject();
});

// ── Edit mode toggle ───────────────────────────────────────────────────
function toggleEdit() {
  if (!currentPage) return;
  editMode = !editMode;
  updateEditUI();
  if (editMode) inject(); else eject();
}

function updateEditUI() {
  editToggle.classList.toggle('active', editMode);
  editToggle.textContent = editMode ? '⏹ Stop Editing' : '✏ Edit Mode';
  editHint.classList.toggle('show', editMode);
}

// ── Inject editing into iframe ─────────────────────────────────────────
function inject() {
  const doc = frame.contentDocument;
  if (!doc) return;

  // Make text elements editable
  doc.querySelectorAll('h1,h2,h3,h4,h5,p,li,.eyebrow,.stat-value,.stat-label').forEach(el => {
    if (el.querySelector('img,iframe,svg') || el.closest('[data-no-edit]')) return;
    el.contentEditable = 'true';
    el.dataset.estEdit = '1';
    el.style.cursor    = 'text';
    el.addEventListener('focus', onFocus);
    el.addEventListener('blur',  onBlur);
  });

  // Make images clickable to replace
  doc.querySelectorAll('img').forEach(img => {
    if (img.closest('nav') || img.closest('.logo')) return; // skip nav logo
    img.dataset.estImg = '1';
    img.style.cursor   = 'pointer';
    img.addEventListener('mouseenter', onImgHover);
    img.addEventListener('mouseleave', onImgLeave);
    img.addEventListener('click',      onImgClick);
  });

  // Make placeholder divs clickable to replace with an image or video
  doc.querySelectorAll('[class*="placeholder"], .about-img-wrap, .media-placeholder, .banner-placeholder').forEach(el => {
    if (el.querySelector('img')) return; // already has an image
    el.dataset.estPlaceholder = '1';
    el.style.cursor   = 'pointer';
    el.style.position = el.style.position || 'relative';
    // Add overlay label
    const lbl = doc.createElement('div');
    lbl.className = '_est-ph-lbl';
    lbl.style.cssText = `
      position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:rgba(8,15,30,0.75);backdrop-filter:blur(3px);gap:10px;z-index:10;
      border:2px dashed rgba(229,41,31,0.5);border-radius:inherit;pointer-events:none;
    `;
    lbl.innerHTML = `
      <span style="font-size:22px">📷</span>
      <span style="font-size:12px;font-weight:600;color:white;letter-spacing:0.04em;">Click to add Image or Video</span>
    `;
    el.appendChild(lbl);
    el.addEventListener('click', () => onPlaceholderClick(el));
  });

  // Make YouTube iframes clickable to swap video
  doc.querySelectorAll('iframe[src*="youtube"]').forEach(iframe => {
    const wrap = doc.createElement('div');
    wrap.style.cssText = 'position:relative;display:inline-block;width:100%;';
    iframe.parentNode.insertBefore(wrap, iframe);
    wrap.appendChild(iframe);
    const lbl = doc.createElement('div');
    lbl.style.cssText = `
      position:absolute;top:8px;right:8px;background:rgba(229,41,31,0.9);color:white;
      font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px;cursor:pointer;
      z-index:10;letter-spacing:0.04em;
    `;
    lbl.textContent = '▶ Change Video';
    lbl.addEventListener('click', () => onVideoClick(iframe));
    wrap.appendChild(lbl);
    wrap.dataset.estVideo = '1';
  });

  // Esc to exit
  doc.addEventListener('keydown', onEsc);
}

function eject() {
  const doc = frame.contentDocument;
  if (!doc) return;
  doc.querySelectorAll('[data-est-edit]').forEach(el => {
    el.contentEditable = 'false';
    delete el.dataset.estEdit;
    el.style.cursor = '';
    el.style.outline = '';
    el.removeEventListener('focus', onFocus);
    el.removeEventListener('blur',  onBlur);
  });
  doc.querySelectorAll('[data-est-img]').forEach(img => {
    delete img.dataset.estImg;
    img.style.cursor  = '';
    img.style.outline = '';
    img.removeEventListener('mouseenter', onImgHover);
    img.removeEventListener('mouseleave', onImgLeave);
    img.removeEventListener('click',      onImgClick);
  });
  doc.querySelectorAll('[data-est-placeholder]').forEach(el => {
    delete el.dataset.estPlaceholder;
    el.style.cursor = '';
    el.querySelector('._est-ph-lbl')?.remove();
  });
  doc.querySelectorAll('[data-est-video]').forEach(wrap => {
    delete wrap.dataset.estVideo;
  });
  doc.getElementById('_estLbl')?.remove();
  doc.removeEventListener('keydown', onEsc);
}

function onFocus(e) { e.target.style.outline = '2px dashed rgba(229,41,31,0.55)'; e.target.style.borderRadius = '3px'; }
function onBlur(e)  { e.target.style.outline = ''; }
function onEsc(e)   { if (e.key === 'Escape') { editMode = false; updateEditUI(); eject(); } }

function onImgHover(e) {
  const img = e.target;
  img.style.outline       = '3px solid rgba(229,41,31,0.7)';
  img.style.outlineOffset = '2px';
  // Tooltip
  const doc = frame.contentDocument;
  doc.getElementById('_estLbl')?.remove();
  const lbl = doc.createElement('div');
  lbl.id = '_estLbl';
  const r = img.getBoundingClientRect();
  lbl.style.cssText = `position:fixed;top:${r.top+r.height/2-12}px;left:${r.left+r.width/2}px;
    transform:translateX(-50%);background:rgba(229,41,31,0.92);color:#fff;font-family:sans-serif;
    font-size:11px;font-weight:700;padding:4px 10px;border-radius:5px;pointer-events:none;
    z-index:999999;white-space:nowrap;letter-spacing:0.04em;`;
  lbl.textContent = '📷 Click to replace';
  doc.body.appendChild(lbl);
}
function onImgLeave(e) {
  e.target.style.outline = '';
  frame.contentDocument?.getElementById('_estLbl')?.remove();
}
function onImgClick(e) {
  e.preventDefault(); e.stopPropagation();
  targetImg = e.target;
  document.getElementById('imgPicker').click();
}

// ── Placeholder click — show image or video choice ────────────────────
function onPlaceholderClick(el) {
  targetImg  = el;
  targetMode = 'placeholder';
  showMediaPicker();
}

// ── Video iframe click ─────────────────────────────────────────────────
function onVideoClick(iframe) {
  targetImg  = iframe;
  targetMode = 'video';
  showVideoPicker(iframe.src);
}

// ── Media picker modal (image or video) ───────────────────────────────
function showMediaPicker() {
  document.getElementById('mediaPicker')?.remove();
  const modal = document.createElement('div');
  modal.id = 'mediaPicker';
  modal.style.cssText = `
    position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;
    display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);
  `;
  modal.innerHTML = `
    <div style="background:#0d1424;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;width:400px;max-width:90vw;">
      <h3 style="font-size:15px;font-weight:700;color:white;margin-bottom:6px;">Add Media</h3>
      <p style="font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:20px;">Choose what to put in this space</p>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <button onclick="document.getElementById('mediaPicker').remove();document.getElementById('imgPicker').click()"
          style="background:#0f1e35;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:14px 16px;
          color:white;font-family:inherit;font-size:13px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;transition:all 0.15s"
          onmouseover="this.style.borderColor='rgba(229,41,31,0.4)'" onmouseout="this.style.borderColor='rgba(255,255,255,0.1)'">
          <span style="font-size:20px;">🖼</span>
          <span><strong style="display:block;margin-bottom:2px;">Upload Image</strong><span style="font-size:11px;color:rgba(255,255,255,0.4);">JPG, PNG, WebP from your computer</span></span>
        </button>
        <button onclick="document.getElementById('mediaPicker').remove();showVideoPicker()"
          style="background:#0f1e35;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:14px 16px;
          color:white;font-family:inherit;font-size:13px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;transition:all 0.15s"
          onmouseover="this.style.borderColor='rgba(229,41,31,0.4)'" onmouseout="this.style.borderColor='rgba(255,255,255,0.1)'">
          <span style="font-size:20px;">▶️</span>
          <span><strong style="display:block;margin-bottom:2px;">Embed YouTube Video</strong><span style="font-size:11px;color:rgba(255,255,255,0.4);">Paste any YouTube link</span></span>
        </button>
      </div>
      <button onclick="document.getElementById('mediaPicker').remove()"
        style="width:100%;margin-top:12px;background:none;border:none;color:rgba(255,255,255,0.3);font-family:inherit;font-size:12px;cursor:pointer;padding:8px;">
        Cancel
      </button>
    </div>
  `;
  document.body.appendChild(modal);
}

// ── Video URL picker ───────────────────────────────────────────────────
function showVideoPicker(existingSrc) {
  document.getElementById('videoPicker')?.remove();
  const currentId = existingSrc ? (existingSrc.match(/embed\/([^?]+)/)?.[1] || '') : '';
  const modal = document.createElement('div');
  modal.id = 'videoPicker';
  modal.style.cssText = `
    position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;
    display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);
  `;
  modal.innerHTML = `
    <div style="background:#0d1424;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;width:440px;max-width:90vw;">
      <h3 style="font-size:15px;font-weight:700;color:white;margin-bottom:4px;">Embed YouTube Video</h3>
      <p style="font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:18px;">Paste a YouTube link and it will be embedded automatically</p>
      <input id="videoUrlInput" type="text"
        placeholder="https://www.youtube.com/watch?v=..."
        value="${currentId ? 'https://www.youtube.com/watch?v=' + currentId : ''}"
        style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
        border-radius:9px;color:white;font-family:inherit;font-size:13px;padding:10px 14px;
        outline:none;margin-bottom:8px;"
      />
      <p style="font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:16px;">
        Works with youtube.com/watch?v=... · youtu.be/... · youtube.com/shorts/...
      </p>
      <div id="videoPreview" style="margin-bottom:16px;display:none;">
        <p style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:8px;">Preview</p>
        <iframe id="videoPreviewFrame" src="" width="100%" height="200" frameborder="0" allow="autoplay;encrypted-media" allowfullscreen style="border-radius:8px;"></iframe>
      </div>
      <div style="display:flex;gap:8px;">
        <button onclick="previewVideo()"
          style="padding:9px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
          border-radius:8px;color:white;font-family:inherit;font-size:13px;cursor:pointer;">
          Preview
        </button>
        <button onclick="applyVideo()"
          style="flex:1;padding:9px 16px;background:#e5291f;border:none;
          border-radius:8px;color:white;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;">
          ✓ Add Video
        </button>
        <button onclick="document.getElementById('videoPicker').remove()"
          style="padding:9px 14px;background:none;border:1px solid rgba(255,255,255,0.08);
          border-radius:8px;color:rgba(255,255,255,0.4);font-family:inherit;font-size:13px;cursor:pointer;">
          Cancel
        </button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function extractYouTubeId(url) {
  const patterns = [
    /youtube\.com\/watch\?v=([^&]+)/,
    /youtu\.be\/([^?]+)/,
    /youtube\.com\/embed\/([^?]+)/,
    /youtube\.com\/shorts\/([^?]+)/,
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}

function previewVideo() {
  const url = document.getElementById('videoUrlInput').value.trim();
  const id  = extractYouTubeId(url);
  if (!id) { alert('Could not find a YouTube video ID in that URL. Please check the link.'); return; }
  const preview = document.getElementById('videoPreview');
  document.getElementById('videoPreviewFrame').src = `https://www.youtube.com/embed/${id}`;
  preview.style.display = 'block';
}

function applyVideo() {
  const url = document.getElementById('videoUrlInput').value.trim();
  const id  = extractYouTubeId(url);
  if (!id) { alert('Invalid YouTube URL.'); return; }
  const embedSrc = `https://www.youtube.com/embed/${id}`;
  document.getElementById('videoPicker').remove();

  const doc = frame.contentDocument;

  if (targetMode === 'video' && targetImg?.tagName === 'IFRAME') {
    // Swap existing YouTube iframe
    targetImg.src = embedSrc;
    setStatus('Video updated — save to publish', 'ok');
  } else if (targetMode === 'placeholder' && targetImg) {
    // Replace placeholder div with video iframe
    const wrapper = doc.createElement('div');
    wrapper.style.cssText = 'position:relative;width:100%;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;';
    const iframe = doc.createElement('iframe');
    iframe.src = embedSrc;
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
    iframe.allowFullscreen = true;
    iframe.frameBorder = '0';
    iframe.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border-radius:12px;';
    wrapper.appendChild(iframe);
    targetImg.replaceWith(wrapper);
    setStatus('Video embedded — save to publish', 'ok');
  }

  targetImg  = null;
  targetMode = 'image';
}

// ── Image file picker ─────────────────────────────────────────────────
document.getElementById('imgPicker').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    if (targetMode === 'placeholder' && targetImg) {
      // Replace placeholder div with an actual img
      const img = frame.contentDocument.createElement('img');
      img.src   = ev.target.result;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block;';
      img.alt   = '';
      targetImg.innerHTML = '';
      targetImg.appendChild(img);
      setStatus('Image added — save to publish', 'ok');
    } else if (targetImg) {
      targetImg.src = ev.target.result;
      setStatus('Image replaced — save to publish', 'ok');
    }
    targetImg  = null;
    targetMode = 'image';
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

// ── Save & Publish ─────────────────────────────────────────────────────
async function saveChanges() {
  if (!currentPage) return;
  if (!ghToken) { setStatus('No GitHub token — set in dashboard', 'err'); return; }

  saveBtn.disabled = true;
  setStatus('Publishing…', 'busy');

  try {
    const doc = frame.contentDocument;

    // Temporarily remove edit artefacts
    const wasEditing = editMode;
    eject();
    doc.getElementById('_estLbl')?.remove();

    const html     = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
    const filePath = currentPage.replace(/^\.\.\//, '');

    const headers = {
      'Authorization': `token ${ghToken}`,
      'Accept':        'application/vnd.github.v3+json',
      'Content-Type':  'application/json',
    };

    const getRes   = await fetch(`${GITHUB_API}/${filePath}`, { headers });
    const fileData = await getRes.json();
    if (!fileData.sha) throw new Error('Could not get file from GitHub');

    const encoded = btoa(unescape(encodeURIComponent(html)));
    const putRes  = await fetch(`${GITHUB_API}/${filePath}`, {
      method: 'PUT', headers,
      body: JSON.stringify({ message: `Update ${filePath} via EST editor`, content: encoded, sha: fileData.sha }),
    });

    if (!putRes.ok) { const err = await putRes.json(); throw new Error(err.message); }

    if (wasEditing) inject();
    setStatus('✓ Published — live in ~30s', 'ok');
  } catch(err) {
    setStatus('Error: ' + err.message, 'err');
  } finally {
    saveBtn.disabled = false;
  }
}

function setStatus(msg, cls) { statusEl.textContent = msg; statusEl.className = cls || ''; }

// Cmd/Ctrl+S to save
window.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveChanges(); } });

// Load home by default
loadPage('../index.html');
</script>
</body>
</html>
